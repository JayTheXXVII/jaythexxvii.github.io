    <!-- HTML Container where domain links will be listed -->
    <div class="link-extractor-box">
        <h3>Internal Domain Links Found:</h3>
        <ol id="domain-links-output" class="link-list">
            <!-- JavaScript will insert the <li> links here -->
        </ol>
    </div>

    <!-- JavaScript Snippet -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 1. Define the target domain you want to filter
            const targetDomain = "xxvii.org"; 
            
            // 2. Grab all 'a' tags on the webpage
            const allLinks = document.querySelectorAll("a");
            const outputList = document.getElementById("domain-links-output");
            
            // 3. Loop through links, filter, and append to the HTML container
            allLinks.forEach(link => {
                const hrefValue = link.href;
                
                // Check if the link contains your specific domain
                if (hrefValue.includes(targetDomain)) {
                    // Create an individual list item element
                    const listItem = document.createElement("li");
                    listItem.className = "link-item";
                    
                    // Create a clickable anchor element
                    const anchor = document.createElement("a");
                    anchor.href = hrefValue;
                    anchor.textContent = hrefValue;
                    anchor.target = "_blank"; // Opens in a new tab
                    
                    // Construct the final HTML structure
                    listItem.appendChild(anchor);
                    outputList.appendChild(listItem);
                }
            });
        });
    </script>
